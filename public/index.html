<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Gudang</title>
<style>
  :root{
    --navy:#1C2333; --navy2:#252E45; --amber:#F5A623; --amber-d:#8A5A0A;
    --green:#2FA84F; --green-bg:#E7F6EC; --green-d:#1E6B33;
    --red:#E5484D; --red-bg:#FDEAEA; --red-d:#9A1F23;
    --gray:#6B7280; --line:#E3E4E8; --bg:#F4F5F7; --card:#FFFFFF;
    --text:#1C2333; --text2:#6B7280;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
  h1,h2,h3{font-family:'Barlow Condensed',system-ui,sans-serif;font-weight:600;letter-spacing:.01em;margin:0;}
  .app{max-width:1180px;margin:0 auto;padding:20px;}
  .login-wrap{min-height:70vh;display:flex;align-items:center;justify-content:center;}
  .login-card{background:var(--navy);color:#fff;border-radius:14px;padding:36px 40px;width:400px;max-width:92vw;}
  .login-card h1{font-size:28px;color:var(--amber);margin-bottom:4px;}
  .login-sub{color:#B9BFD1;font-size:13px;margin-bottom:24px;}
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .role-btn{background:var(--navy2);border:1px solid #3A4358;color:#fff;border-radius:9px;padding:14px 10px;cursor:pointer;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:17px;transition:.15s;}
  .role-btn:hover{border-color:var(--amber);}
  .role-btn.active{background:var(--amber);color:#2A1D00;border-color:var(--amber);}
  .role-btn small{display:block;font-family:'Inter',sans-serif;font-size:11px;color:#B9BFD1;font-weight:400;margin-top:2px;}
  .role-btn.active small{color:#5A3E00;}
  .login-card input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #3A4358;background:#141928;color:#fff;font-size:14px;margin-bottom:10px;}
  .login-card button.go{width:100%;background:var(--amber);color:#2A1D00;border:none;padding:12px;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.03em;}
  .login-err{color:#FFB4B4;font-size:12.5px;margin:-4px 0 10px;}
  .view-only-link{display:block;text-align:center;color:#8B93A8;font-size:12.5px;margin-top:16px;cursor:pointer;text-decoration:underline;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .badge{width:38px;height:38px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--amber);font-family:'Barlow Condensed';font-size:20px;font-weight:700;}
  .brand h1{font-size:22px;}
  .brand .sub{font-size:12px;color:var(--text2);}
  .who{display:flex;align-items:center;gap:12px;}
  .who .tag{background:var(--navy);color:var(--amber);padding:6px 14px;border-radius:20px;font-family:'Barlow Condensed';font-size:15px;font-weight:600;}
  .who button{background:none;border:1px solid var(--line);border-radius:7px;padding:7px 12px;font-size:12.5px;cursor:pointer;color:var(--text2);}
  .who button:hover{border-color:var(--gray);}
  .tabs{display:flex;gap:6px;margin-bottom:20px;}
  .tab{padding:9px 18px;border-radius:8px;cursor:pointer;font-family:'Barlow Condensed';font-size:16px;font-weight:600;color:var(--text2);}
  .tab.active{background:var(--navy);color:#fff;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:22px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;}
  .card .num{font-family:'Barlow Condensed';font-size:32px;font-weight:700;line-height:1;}
  .card .lbl{font-size:12px;color:var(--text2);margin-top:6px;}
  .card.warn .num{color:var(--red);}
  .section-title{font-size:16px;margin:22px 0 10px;color:var(--navy);border-left:4px solid var(--amber);padding-left:10px;}
  .alert-list{background:var(--red-bg);border:1px solid #F3B7B8;border-radius:10px;padding:4px 14px;}
  .alert-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #F3B7B8;font-size:13.5px;}
  .alert-row:last-child{border-bottom:none;}
  .alert-row .spk{font-weight:600;color:var(--red-d);}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
  .toolbar input[type=text]{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;min-width:180px;}
  .btn{background:var(--navy);color:#fff;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-family:'Barlow Condensed';font-size:15px;font-weight:600;}
  .btn.amber{background:var(--amber);color:#2A1D00;}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--text);}
  .btn.sm{padding:6px 12px;font-size:13px;border-radius:6px;}
  .add-form{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px;display:none;}
  .add-form.open{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;}
  .add-form label{font-size:11.5px;color:var(--text2);display:block;margin-bottom:4px;}
  .add-form input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;}
  .item-card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;}
  .item-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:10px;flex-wrap:wrap;}
  .item-head .spk{font-family:'Barlow Condensed';font-size:19px;font-weight:700;color:var(--navy);}
  .item-head .meta{font-size:12px;color:var(--text2);margin-top:2px;}
  .item-head .overdue{color:var(--red-d);font-weight:600;}
  .stages-mini{display:flex;gap:6px;flex-wrap:wrap;}
  .stat-pill{padding:5px 11px;border-radius:20px;font-size:11.5px;font-weight:600;font-family:'Inter';display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .stat-pill.ok{background:var(--green-bg);color:var(--green-d);}
  .stat-pill.partial{background:#FEF3DE;color:var(--amber-d);}
  .stat-pill.pending{background:#EFEFF1;color:var(--text2);}
  .stat-pill.hasret{background:var(--red-bg);color:var(--red-d);}
  .item-body{border-top:1px solid var(--line);padding:16px;display:none;background:#FAFAFB;}
  .item-body.open{display:block;}
  .stage-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:760px){.stage-grid{grid-template-columns:1fr;}.add-form.open{grid-template-columns:1fr;}}
  .stage-box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .stage-box h4{font-size:14px;margin-bottom:2px;}
  .stage-box .zh{color:var(--text2);font-weight:400;font-size:12px;}
  .progress-track{background:#EDEDEF;border-radius:6px;height:8px;margin:8px 0;overflow:hidden;}
  .progress-fill{background:var(--green);height:100%;}
  .progress-fill.partial{background:var(--amber);}
  .hist-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:3px 0;border-bottom:1px dashed #EAEAEC;}
  .hist-row:last-child{border-bottom:none;}
  .inline-form{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .inline-form input{flex:1;padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;min-width:70px;}
  .locked{color:var(--text2);font-size:12px;font-style:italic;padding:6px 0;}
  .ret-item{background:var(--red-bg);border:1px solid #F3B7B8;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12.5px;}
  .ret-item .top{display:flex;justify-content:space-between;font-weight:600;color:var(--red-d);}
  .ret-item .meta{color:var(--text2);margin-top:2px;}
  .empty{text-align:center;color:var(--text2);padding:40px 10px;font-size:13.5px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:50;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<script>
const ROLE_INFO = {
  PPIC: {label:'PPIC', full:'Planning & Produksi'},
  WH: {label:'WH', full:'Warehouse'},
  SF: {label:'SF', full:'Sewing Floor'}
};

let state = {
  role: localStorage.getItem('gudang_role') || null,
  token: localStorage.getItem('gudang_token') || null,
  items: [],
  tab: 'dashboard',
  expanded: null,
  search: '',
  loginRoleSel: null,
  loginErr: '',
  addOpen: false,
  loading: true
};

function esc(s){
  const d = document.createElement('div');
  d.innerText = s == null ? '' : String(s);
  return d.innerHTML;
}
function todayStr(){ return dayjs().format('YYYY-MM-DD'); }
function fmtDate(d){ return d ? dayjs(d).format('DD MMM YY') : '-'; }

async function api(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(state.token) headers['x-auth-token'] = state.token;
  const res = await fetch('/api'+path, Object.assign({}, opts, {headers}));
  if(res.status === 403){ showToast('Akses ditolak untuk peran ini.'); throw new Error('forbidden'); }
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || 'Terjadi kesalahan.');
  return data;
}
function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

async function loadItems(){
  try{
    state.items = await api('/items');
  }catch(e){ console.error(e); showToast('Gagal memuat data dari server.'); }
  state.loading = false;
}

function stageSum(stage){ return stage.history.reduce((a,h)=>a+Number(h.qty),0); }
function stageStatus(stage, qtyTotal){
  const sum = stageSum(stage);
  if(sum <= 0) return 'pending';
  if(sum >= qtyTotal) return 'ok';
  return 'partial';
}
function activeReturan(item){ return item.returan.filter(r=>r.status==='pending'); }

function perm(){
  const r = state.role;
  return {
    canAddItem: r==='PPIC',
    canEditPlanning: r==='PPIC',
    canEditWhReady: r==='PPIC'||r==='WH',
    canEditPengambilan: r==='PPIC'||r==='SF',
    canAddReturan: r==='PPIC'||r==='WH'||r==='SF',
    canConfirmReturan: r==='WH'
  };
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = state.role ? renderMain() : renderLogin();
  attachEvents();
}

function renderLogin(){
  const sel = state.loginRoleSel;
  return `
  <div class="login-wrap">
    <div class="login-card">
      <h1>Dashboard Gudang</h1>
      <div class="login-sub">Pilih peran untuk masuk</div>
      <div class="role-grid">
        ${Object.keys(ROLE_INFO).map(k=>`
          <div class="role-btn ${sel===k?'active':''}" data-role="${k}">${ROLE_INFO[k].label}<small>${ROLE_INFO[k].full}</small></div>
        `).join('')}
      </div>
      ${sel ? `
        <input type="password" id="passInput" placeholder="Masukkan passcode ${ROLE_INFO[sel].label}" />
        ${state.loginErr ? `<div class="login-err">${esc(state.loginErr)}</div>` : ''}
        <button class="go" id="loginGo">Masuk sebagai ${ROLE_INFO[sel].label}</button>
      ` : ''}
      <div class="view-only-link" id="viewOnlyBtn">Masuk sebagai tampilan saja (Dashboard/View Only)</div>
    </div>
  </div>`;
}

function renderMain(){
  const p = perm();
  return `
  <div class="topbar">
    <div class="brand">
      <div class="badge">仓</div>
      <div><h1>Dashboard Gudang</h1><div class="sub">SPK · XFD · QTY tracking</div></div>
    </div>
    <div class="who">
      <div class="tag">${state.role==='VIEW' ? 'View only' : ROLE_INFO[state.role].label + ' — ' + ROLE_INFO[state.role].full}</div>
      <button id="logoutBtn">Keluar</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab ${state.tab==='dashboard'?'active':''}" data-tab="dashboard">Dashboard</div>
    <div class="tab ${state.tab==='data'?'active':''}" data-tab="data">Data SPK</div>
  </div>
  ${state.loading ? '<div class="empty">Memuat data...</div>' : (state.tab==='dashboard' ? renderDashboard() : renderData(p))}
  `;
}

function renderDashboard(){
  const items = state.items;
  const total = items.length;
  let planDone=0, whOk=0, whPartial=0, pengOk=0, pengPartial=0, retActive=0, overdue=[];
  items.forEach(it=>{
    if(it.planning.done) planDone++;
    const ws = stageStatus(it.whReady, it.qty);
    const ps = stageStatus(it.pengambilan, it.qty);
    if(ws==='ok') whOk++; if(ws==='partial') whPartial++;
    if(ps==='ok') pengOk++; if(ps==='partial') pengPartial++;
    const ar = activeReturan(it);
    retActive += ar.length;
    const isOverdue = dayjs(it.xfd).isBefore(dayjs(), 'day') && ps!=='ok';
    if(isOverdue) overdue.push(it);
  });
  return `
  <div class="cards">
    <div class="card"><div class="num">${total}</div><div class="lbl">Total SPK</div></div>
    <div class="card"><div class="num">${planDone}/${total}</div><div class="lbl">Planning 計劃 selesai</div></div>
    <div class="card"><div class="num">${whOk}</div><div class="lbl">WH Ready 備料 OK (${whPartial} parsial)</div></div>
    <div class="card"><div class="num">${pengOk}</div><div class="lbl">Pengambilan 領料 OK (${pengPartial} parsial)</div></div>
    <div class="card ${retActive>0?'warn':''}"><div class="num">${retActive}</div><div class="lbl">Returan 退料 aktif</div></div>
    <div class="card ${overdue.length>0?'warn':''}"><div class="num">${overdue.length}</div><div class="lbl">XFD lewat, belum diambil</div></div>
  </div>
  ${overdue.length>0 ? `
  <div class="section-title">SPK lewat XFD belum selesai pengambilan</div>
  <div class="alert-list">
    ${overdue.map(it=>`<div class="alert-row"><span class="spk">${esc(it.spk)}</span><span>XFD ${fmtDate(it.xfd)} · qty ${it.qty}</span></div>`).join('')}
  </div>` : ''}
  ${total===0 ? '<div class="empty">Belum ada data SPK. Tambahkan lewat tab "Data SPK" (perlu login PPIC).</div>' : ''}
  `;
}

function renderData(p){
  const q = state.search.toLowerCase();
  const items = state.items.filter(it=> !q || it.spk.toLowerCase().includes(q));
  return `
  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="Cari SPK..." value="${esc(state.search)}" />
    ${p.canAddItem ? `<button class="btn amber" id="toggleAdd">${state.addOpen?'Tutup form':'+ Tambah SPK baru'}</button>` : ''}
  </div>
  ${p.canAddItem ? `
  <div class="add-form ${state.addOpen?'open':''}">
    <div><label>SPK</label><input type="text" id="newSpk" placeholder="SPK-0001" /></div>
    <div><label>XFD</label><input type="date" id="newXfd" value="${todayStr()}" /></div>
    <div><label>QTY</label><input type="number" id="newQty" min="1" placeholder="1000" /></div>
    <button class="btn" id="saveNewItem">Simpan</button>
  </div>` : ''}
  ${items.length===0 ? '<div class="empty">Tidak ada data.</div>' : items.map(it=>renderItemCard(it,p)).join('')}
  `;
}

function renderItemCard(it, p){
  const ws = stageStatus(it.whReady, it.qty);
  const ps = stageStatus(it.pengambilan, it.qty);
  const ar = activeReturan(it);
  const isOpen = state.expanded === it.id;
  const overdue = dayjs(it.xfd).isBefore(dayjs(),'day') && ps!=='ok';
  return `
  <div class="item-card">
    <div class="item-head" data-toggle="${it.id}">
      <div>
        <div class="spk">${esc(it.spk)}</div>
        <div class="meta ${overdue?'overdue':''}">XFD ${fmtDate(it.xfd)}${overdue?' · terlewat':''} · QTY ${it.qty}</div>
      </div>
      <div class="stages-mini">
        <span class="stat-pill ${it.planning.done?'ok':'pending'}">計劃 ${it.planning.done?'OK':'-'}</span>
        <span class="stat-pill ${ws}">備料 ${ws==='ok'?'OK':ws==='partial'?'Parsial':'-'}</span>
        <span class="stat-pill ${ps}">領料 ${ps==='ok'?'OK':ps==='partial'?'Parsial':'-'}</span>
        ${ar.length>0 ? `<span class="stat-pill hasret">退料 ${ar.length}</span>` : ''}
      </div>
    </div>
    <div class="item-body ${isOpen?'open':''}">
      ${isOpen ? renderItemDetail(it,p,ws,ps) : ''}
    </div>
  </div>`;
}

function renderItemDetail(it,p,ws,ps){
  const whSum = stageSum(it.whReady);
  const pengSum = stageSum(it.pengambilan);
  return `
  <div class="stage-grid">
    <div class="stage-box">
      <h4>Planning <span class="zh">計劃</span></h4>
      ${it.planning.done
        ? `<div class="stat-pill ok" style="margin-top:6px;">Selesai · ${fmtDate(it.planning.date)}</div>`
        : (p.canEditPlanning
            ? `<div class="inline-form"><button class="btn sm amber" data-planning-done="${it.id}">Tandai selesai</button></div>`
            : `<div class="locked">Belum ditandai selesai</div>`)}
    </div>

    <div class="stage-box">
      <h4>WH Ready <span class="zh">備料</span></h4>
      <div class="progress-track"><div class="progress-fill ${ws==='partial'?'partial':''}" style="width:${Math.min(100,whSum/it.qty*100)}%"></div></div>
      <div style="font-size:12px;color:var(--text2);">${whSum} / ${it.qty}</div>
      ${it.whReady.history.map(h=>`<div class="hist-row"><span>${fmtDate(h.date)} · ${esc(h.by)}</span><span>+${h.qty}</span></div>`).join('')}
      ${p.canEditWhReady && ws!=='ok' ? `
      <div class="inline-form">
        <input type="number" min="1" placeholder="qty" id="wh-qty-${it.id}" />
        <input type="date" value="${todayStr()}" id="wh-date-${it.id}" />
        <button class="btn sm" data-add-wh="${it.id}">Tambah</button>
      </div>` : (!p.canEditWhReady ? `<div class="locked">Hanya PPIC/WH</div>` : '')}
    </div>

    <div class="stage-box">
      <h4>Pengambilan <span class="zh">領料</span></h4>
      <div class="progress-track"><div class="progress-fill ${ps==='partial'?'partial':''}" style="width:${Math.min(100,pengSum/it.qty*100)}%"></div></div>
      <div style="font-size:12px;color:var(--text2);">${pengSum} / ${it.qty}</div>
      ${it.pengambilan.history.map(h=>`<div class="hist-row"><span>${fmtDate(h.date)} · ${esc(h.by)}</span><span>+${h.qty}</span></div>`).join('')}
      ${p.canEditPengambilan && ps!=='ok' ? `
      <div class="inline-form">
        <input type="number" min="1" placeholder="qty" id="peng-qty-${it.id}" />
        <input type="date" value="${todayStr()}" id="peng-date-${it.id}" />
        <button class="btn sm" data-add-peng="${it.id}">Tambah</button>
      </div>` : (!p.canEditPengambilan ? `<div class="locked">Hanya PPIC/SF</div>` : '')}
    </div>

    <div class="stage-box">
      <h4>Returan <span class="zh">退料</span></h4>
      ${activeReturan(it).length===0 ? `<div style="font-size:12px;color:var(--text2);">Tidak ada returan aktif</div>` : activeReturan(it).map(r=>`
        <div class="ret-item">
          <div class="top"><span>Qty ${r.qty}</span><span>${fmtDate(r.date)}</span></div>
          <div class="meta">${esc(r.reason||'-')} · diajukan ${esc(r.by)}</div>
          ${p.canConfirmReturan ? `<button class="btn sm ghost" style="margin-top:6px;" data-confirm-ret="${r.id}">Tandai OK (gudang)</button>` : ''}
        </div>
      `).join('')}
      ${p.canAddReturan ? `
      <div class="inline-form">
        <input type="number" min="1" placeholder="qty" id="ret-qty-${it.id}" />
        <input type="text" placeholder="alasan" id="ret-reason-${it.id}" />
        <button class="btn sm" data-add-ret="${it.id}">Ajukan</button>
      </div>` : `<div class="locked">Hanya PPIC/WH/SF</div>`}
    </div>
  </div>`;
}

function attachEvents(){
  const app = document.getElementById('app');

  app.querySelectorAll('[data-role]').forEach(el=>{
    el.onclick = ()=>{ state.loginRoleSel = el.dataset.role; state.loginErr=''; render(); };
  });
  const loginGo = document.getElementById('loginGo');
  if(loginGo){
    loginGo.onclick = async ()=>{
      const val = document.getElementById('passInput').value;
      try{
        const data = await api('/login', {method:'POST', body: JSON.stringify({role: state.loginRoleSel, passcode: val})});
        state.role = data.role; state.token = data.token;
        localStorage.setItem('gudang_role', data.role);
        localStorage.setItem('gudang_token', data.token);
        state.loginErr=''; state.loginRoleSel=null;
        state.loading = true; render();
        await loadItems(); render();
      }catch(e){
        state.loginErr = e.message || 'Passcode salah.'; render();
      }
    };
  }
  const vo = document.getElementById('viewOnlyBtn');
  if(vo) vo.onclick = async ()=>{
    state.role='VIEW'; state.token=null;
    localStorage.removeItem('gudang_token'); localStorage.setItem('gudang_role','VIEW');
    state.loading = true; render();
    await loadItems(); render();
  };

  const logout = document.getElementById('logoutBtn');
  if(logout) logout.onclick = ()=>{
    state.role=null; state.token=null; state.tab='dashboard';
    localStorage.removeItem('gudang_role'); localStorage.removeItem('gudang_token');
    render();
  };

  app.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{ state.tab = el.dataset.tab; render(); };
  });

  const search = document.getElementById('searchBox');
  if(search){
    search.oninput = (e)=>{
      state.search = e.target.value; render();
      const sb = document.getElementById('searchBox');
      sb.focus(); sb.setSelectionRange(state.search.length,state.search.length);
    };
  }

  const toggleAdd = document.getElementById('toggleAdd');
  if(toggleAdd) toggleAdd.onclick = ()=>{ state.addOpen = !state.addOpen; render(); };

  const saveNew = document.getElementById('saveNewItem');
  if(saveNew) saveNew.onclick = async ()=>{
    const spk = document.getElementById('newSpk').value.trim();
    const xfd = document.getElementById('newXfd').value;
    const qty = Number(document.getElementById('newQty').value);
    if(!spk || !xfd || !qty || qty<=0){ showToast('Isi SPK, XFD, dan QTY dengan benar.'); return; }
    try{
      state.items = await api('/items', {method:'POST', body: JSON.stringify({spk, xfd, qty})});
      state.addOpen = false; render();
    }catch(e){ showToast(e.message); }
  };

  app.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick = ()=>{ const id = el.dataset.toggle; state.expanded = state.expanded===id ? null : id; render(); };
  });

  const planBtn = app.querySelector('[data-planning-done]');
  if(planBtn) planBtn.onclick = async ()=>{
    try{
      state.items = await api(`/items/${planBtn.dataset.planningDone}/planning`, {method:'POST'});
      render();
    }catch(e){ showToast(e.message); }
  };

  const addWh = app.querySelector('[data-add-wh]');
  if(addWh) addWh.onclick = async ()=>{
    const id = addWh.dataset.addWh;
    const qty = Number(document.getElementById('wh-qty-'+id).value);
    const date = document.getElementById('wh-date-'+id).value;
    if(!qty||qty<=0){ showToast('Isi qty.'); return; }
    try{
      state.items = await api(`/items/${id}/wh-ready`, {method:'POST', body: JSON.stringify({qty, date})});
      render();
    }catch(e){ showToast(e.message); }
  };

  const addPeng = app.querySelector('[data-add-peng]');
  if(addPeng) addPeng.onclick = async ()=>{
    const id = addPeng.dataset.addPeng;
    const qty = Number(document.getElementById('peng-qty-'+id).value);
    const date = document.getElementById('peng-date-'+id).value;
    if(!qty||qty<=0){ showToast('Isi qty.'); return; }
    try{
      state.items = await api(`/items/${id}/pengambilan`, {method:'POST', body: JSON.stringify({qty, date})});
      render();
    }catch(e){ showToast(e.message); }
  };

  const addRet = app.querySelector('[data-add-ret]');
  if(addRet) addRet.onclick = async ()=>{
    const id = addRet.dataset.addRet;
    const qty = Number(document.getElementById('ret-qty-'+id).value);
    const reason = document.getElementById('ret-reason-'+id).value.trim();
    if(!qty||qty<=0){ showToast('Isi qty.'); return; }
    try{
      state.items = await api(`/items/${id}/returan`, {method:'POST', body: JSON.stringify({qty, reason})});
      render();
    }catch(e){ showToast(e.message); }
  };

  const confirmRet = app.querySelector('[data-confirm-ret]');
  if(confirmRet) confirmRet.onclick = async ()=>{
    const retId = confirmRet.dataset.confirmRet;
    try{
      state.items = await api(`/returan/${retId}/confirm`, {method:'POST'});
      render();
    }catch(e){ showToast(e.message); }
  };
}

(async function init(){
  if(state.role){
    await loadItems();
  } else {
    state.loading = false;
  }
  render();
})();
</script>
</body>
</html>
